<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="60" height="60" role="img" aria-label="Halftone crescent mark">
  <defs>
    <pattern id="dots" width="7" height="7" patternUnits="userSpaceOnUse">
      <rect width="7" height="7" fill="#1A1612"/>
      <circle cx="3.5" cy="3.5" r="1.6" fill="#EAE7E0"/>
    </pattern>
    <clipPath id="right"><rect x="50" y="0" width="50" height="100"/></clipPath>
  </defs>
  <circle cx="50" cy="50" r="47" fill="#1A1612"/>
  <circle cx="50" cy="50" r="47" fill="url(#dots)" clip-path="url(#right)"/>
</svg>
